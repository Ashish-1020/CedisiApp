spring.application.name=ragApp

spring.ai.openai.api-key=${GPT_API_KEY}
spring.ai.openai.chat.options.model=gpt-5.2
spring.ai.anthropic.api-key=${CLAUDE_API_KEY:}
spring.ai.anthropic.base-url=${CLAUDE_BASE_URL:https://api.anthropic.com}

# LLM runtime selection (DB can override model/provider, these settings are guardrails).
app.llm.default-provider=OPENAI
app.llm.allowed-providers=OPENAI,GEMINI,GROK,CLAUDE
app.llm.allowed-models=gpt-5.2,gpt-4.1-mini
app.llm.allowed-models-by-provider=OPENAI:gpt-5.2|gpt-4.1-mini;GEMINI:gemini-2.5-flash|gemini-2.5-pro;GROK:grok-3-mini|grok-3;CLAUDE:claude-3-5-sonnet-latest|claude-3-7-sonnet-latest
app.llm.provider.openai.enabled=true
app.llm.provider.openai.api-key=${OPENAI_API_KEY:${GPT_API_KEY:}}
app.llm.provider.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}
app.llm.provider.openai.completions-path=/v1/chat/completions
app.llm.provider.openai.connect-timeout-seconds=10
app.llm.provider.openai.read-timeout-seconds=60

# Provider routing switches for branches in LlmChatClientFactory.
# OPENAI/GEMINI/GROK/CLAUDE are all instantiated with provider-specific OpenAI-compatible settings.
# GEMINI/GROK/CLAUDE routing mode must remain OPENAI_COMPATIBLE.
app.llm.provider.gemini.enabled=true
app.llm.provider.gemini.routing-mode=OPENAI_COMPATIBLE
app.llm.provider.gemini.api-key=${GEMINI_API_KEY:}
app.llm.provider.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
app.llm.provider.gemini.completions-path=/v1beta/openai/chat/completions
app.llm.provider.gemini.connect-timeout-seconds=15
app.llm.provider.gemini.read-timeout-seconds=120
app.llm.provider.grok.enabled=true
app.llm.provider.grok.routing-mode=OPENAI_COMPATIBLE
app.llm.provider.grok.api-key=${GROK_API_KEY:}
app.llm.provider.grok.base-url=${GROK_BASE_URL:https://api.x.ai}
app.llm.provider.grok.completions-path=/v1/chat/completions
app.llm.provider.grok.connect-timeout-seconds=10
app.llm.provider.grok.read-timeout-seconds=90
app.llm.provider.claude.enabled=true
app.llm.provider.claude.routing-mode=ANTHROPIC_NATIVE
app.llm.provider.claude.api-key=${CLAUDE_API_KEY:}
app.llm.provider.claude.base-url=${CLAUDE_BASE_URL:https://api.anthropic.com}
app.llm.provider.claude.completions-path=/v1/messages
app.llm.provider.claude.connect-timeout-seconds=10
app.llm.provider.claude.read-timeout-seconds=90
app.llm.provider.claude.max-tokens=10000

app.admin.api-key=${ADMIN_API_KEY:}
#spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.embedding.options.model=text-embedding-3-small

# Pinecone
spring.ai.vectorstore.pinecone.apiKey=${PINECONE_API_KEY}
spring.ai.vectorstore.pinecone.host=cedisiapp-sseldaq.svc.aped-4627-b74a.pinecone.io
spring.ai.vectorstore.pinecone.index-name=cedisiapp



spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

#spring.datasource.url=jdbc:postgresql://localhost:5432/msmeApp
#spring.datasource.username=postgres
#spring.datasource.password=Ashish
spring.jpa.hibernate.ddl-auto=update

razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.subscription.notification.enabled=true
app.subscription.reminder-days-before=3
app.subscription.notification.fixed-delay-ms=3600000

